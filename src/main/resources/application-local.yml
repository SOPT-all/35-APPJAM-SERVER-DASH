spring:
  config:
    activate:
      on-profile: local
  application:
    name: dash
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/dash?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: wodus050&


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-valid-time: ${ACCESS_TOKEN_VALID_TIME}
  refresh-token-valid-time: ${REFRESH_TOKEN_VALID_TIME}

kakao:
  client-id: ${KAKAO_CLIENT_ID}

s3:
  secret-key: ${SECRET_KEY}
  access-key: ${ACCESS_KEY}
  s3-endpoint: ${S3_ENDPOINT}
  region: ${REGION}
  s3-bucket-name: ${S3_BUCKET_NAME}

naver:
  client-id: ${CLIENT_ID}
  client-secret: ${CLIENT_SECRET}
